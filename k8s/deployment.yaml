apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: veerareddyravuri/appname:cc613755d5c25ed002d484eea6dc1c13f91171c6
          ports:
            - containerPort: 8080