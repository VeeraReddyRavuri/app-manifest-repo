apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: veerareddyravuri/appname:ee47350e7ee944e9fe89ee83de344ac6ba9e0da3
          ports:
            - containerPort: 8080